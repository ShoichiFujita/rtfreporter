<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  rtfreporter hex logo
  ====================

  Part of the **ichirio** package family.  Shared design language across
  all ichirio packages:

    * pointy-top hexagon (R community convention)
    * navy hex frame   (#0d2840) and gradient body (#2a6aa1 -> #143a5b)
    * package wordmark inside the hex
    * a small "ichirio" attribution along the lower hex edge, low
      opacity (visible on close inspection only)

  rtfreporter-specific element: a miniature clinical TFL page rendered
  exactly as `generate_rtfreport()` would produce it — borderless
  header, centred title, clinical-TFL body table, italic footnote.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="480" height="554"
     viewBox="0 0 480 554">

  <!-- ── Definitions ───────────────────────────────────────────────── -->
  <defs>
    <linearGradient id="hexbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a6aa1"/>
      <stop offset="100%" stop-color="#143a5b"/>
    </linearGradient>
    <filter id="paper-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3"
                    flood-color="#0a1c30" flood-opacity="0.45"/>
    </filter>
    <clipPath id="hex-clip">
      <polygon points="240,8 472,143 472,411 240,546 8,411 8,143"/>
    </clipPath>
  </defs>

  <!-- ── Hexagon body (filled background) ─────────────────────────── -->
  <polygon points="240,8 472,143 472,411 240,546 8,411 8,143"
           fill="url(#hexbg)"/>

  <!-- ── Mini clinical report inside the hex ──────────────────────── -->
  <g clip-path="url(#hex-clip)">
    <!-- Landscape paper sheet -->
    <rect x="68" y="120" width="344" height="232" rx="6" ry="6"
          fill="#ffffff" stroke="#9fb6c8" stroke-width="1.2"
          filter="url(#paper-shadow)"/>

    <!-- Borderless header table -->
    <g font-family="Source Sans 3, Helvetica, Arial, sans-serif" fill="#4a5a6a">
      <text x="84"  y="146" font-size="11" text-anchor="start">Protocol XYZ-001</text>
      <text x="396" y="146" font-size="11" text-anchor="end">Page 1 of 1</text>
      <text x="84"  y="161" font-size="11" text-anchor="start">ACME Pharma</text>
      <text x="396" y="161" font-size="11" text-anchor="end">Confidential</text>
    </g>

    <!-- Centred title block -->
    <g font-family="Source Sans 3, Helvetica, Arial, sans-serif" fill="#1f4e79">
      <text x="240" y="190" font-size="16" font-weight="700"
            text-anchor="middle">Table 14.1.1</text>
      <text x="240" y="208" font-size="12" font-weight="600"
            text-anchor="middle">Demographics</text>
    </g>

    <!-- Body table: column-header top rule -->
    <line x1="84" y1="228" x2="396" y2="228"
          stroke="#1a3a5a" stroke-width="1.3"/>

    <!-- Column-header labels -->
    <g font-family="Source Sans 3, Helvetica, Arial, sans-serif"
       font-size="10.5" font-weight="600" fill="#1f3a5a">
      <text x="92"  y="242" text-anchor="start">Characteristic</text>
      <text x="222" y="242" text-anchor="middle">Placebo</text>
      <text x="294" y="242" text-anchor="middle">Active</text>
      <text x="368" y="242" text-anchor="middle">Total</text>
    </g>

    <!-- Column-header bottom rule -->
    <line x1="84" y1="250" x2="396" y2="250"
          stroke="#1a3a5a" stroke-width="1.3"/>

    <!-- Data rows (no per-row borders) -->
    <g font-family="Source Sans 3, Helvetica, Arial, sans-serif"
       font-size="10" fill="#3a4a5a">
      <text x="92"  y="266" text-anchor="start">Age, mean</text>
      <text x="222" y="266" text-anchor="middle">52.3</text>
      <text x="294" y="266" text-anchor="middle">54.1</text>
      <text x="368" y="266" text-anchor="middle">53.2</text>

      <text x="92"  y="282" text-anchor="start">Sex, n (%)</text>

      <text x="102" y="298" text-anchor="start">Female</text>
      <text x="222" y="298" text-anchor="middle">16 (53)</text>
      <text x="294" y="298" text-anchor="middle">14 (47)</text>
      <text x="368" y="298" text-anchor="middle">30 (50)</text>

      <text x="102" y="314" text-anchor="start">Male</text>
      <text x="222" y="314" text-anchor="middle">14 (47)</text>
      <text x="294" y="314" text-anchor="middle">16 (53)</text>
      <text x="368" y="314" text-anchor="middle">30 (50)</text>
    </g>

    <!-- Italic footnote -->
    <text x="84" y="340"
          font-family="Source Sans 3, Helvetica, Arial, sans-serif"
          font-size="9" font-style="italic" fill="#6a7886">
      Source: ADaM ADSL.
    </text>
  </g>

  <!-- ── Package wordmark ─────────────────────────────────────────── -->
  <text x="240" y="455"
        font-family="Source Sans 3, Helvetica, Arial, sans-serif"
        font-size="42" font-weight="700"
        text-anchor="middle" fill="#ffffff"
        letter-spacing="-0.5">rtfreporter</text>

  <!-- ── Per-package tagline ──────────────────────────────────────── -->
  <text x="240" y="485"
        font-family="Source Sans 3, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400"
        text-anchor="middle" fill="#cfe1f2"
        letter-spacing="3">CLINICAL · TFL · RTF</text>

  <!-- ── Shared "ichirio" attribution (subtle, lower hex edge) ────── -->
  <text x="240" y="528"
        font-family="Source Sans 3, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="500"
        text-anchor="middle" fill="#ffffff" opacity="0.32"
        letter-spacing="6">i c h i r i o</text>

  <!-- ── Hexagon outline on top so it does not get clipped ────────── -->
  <polygon points="240,8 472,143 472,411 240,546 8,411 8,143"
           fill="none" stroke="#0d2840" stroke-width="14"
           stroke-linejoin="round"/>
</svg>
